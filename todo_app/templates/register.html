{% extends "index.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center vh-100">
  <div class="text-center">
    <div class="mb-4">
      <button id="show-register" class="btn btn-secondary me-2">Đăng ký</button>
      <button id="show-login" class="btn btn-primary">Đăng nhập</button>
    </div>
    <div id="register-form" class="form-container active">
      <h2 class="mb-4">Đăng ký</h2>
      <form>
        <div class="mb-3">
          <input type="text" id="reg-name" class="form-control" placeholder="Tên">
        </div>
        <div class="mb-3">
          <input type="email" id="reg-email" class="form-control" placeholder="Email">
        </div>
        <div class="mb-3">
          <input type="password" id="reg-password" class="form-control" placeholder="Mật khẩu">
        </div>
        <button type="submit" class="btn btn-success w-100">Đăng ký</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
